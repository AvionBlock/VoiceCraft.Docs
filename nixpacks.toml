[variables]
NODE_ENV = "production"
HOST = "0.0.0.0"
NITRO_HOST = "0.0.0.0"

[phases.setup]
nixPkgs = ["nodejs_22", "python3", "pkg-config", "gcc"]

[phases.install]
cmds = [
  "npm exec --yes pnpm@10.33.2 -- install --frozen-lockfile"
]

[phases.build]
cmds = ["npm exec --yes pnpm@10.33.2 -- build"]

[start]
cmd = "node .output/server/index.mjs"
