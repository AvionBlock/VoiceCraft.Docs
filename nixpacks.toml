[variables]
NODE_ENV = "production"
HOST = "0.0.0.0"
NITRO_HOST = "0.0.0.0"

[phases.setup]
nixPkgs = ["nodejs_22", "python3", "pkg-config", "gcc"]

[phases.install]
cmds = [
  "npm install -g pnpm@10.33.2",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start"
